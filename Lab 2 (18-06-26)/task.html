<html>
<head>
    <title>Pental Shop</title>
    <link rel="stylesheet" type="text/css" href="task.css">
</head>

<body>
    <h2><center>
        About This Lab </center>
    </h2>
    <p> 

    <center>
        In this lab, you will learn basic HTML structure, formatting text, creating 
simple tables, and using forms for input.</center>
    </p>

    <table>
        <tr>
            <th>Item Name</th>
            <th>Quantity</th>
            <th>Status</th>
        </tr>

        <tr>
            <td>Pencils</td>
            <td>100</td>
            <td>In Stock</td>
        </tr>

        <tr>
            <td>Notebooks</td>
            <td>50</td>
            <td>Low Stock</td>
        </tr>

        <tr>
            <td>Markers</td>
            <td>15</td>
            <td>In Stock</td>
        </tr>
    </table>

    <div class="ContactBox">

        <h1>Contact Information</h1>

        <h3>
            Name
            <input type="text">
        </h3>

        <h3>
            Email
            <input type="text">
        </h3>

        <h3>
            Message
            <textarea class="inputMessage"></textarea>
        </h3>

        <button type="submit">Submit</button>

    </div>

</body>
</html>
